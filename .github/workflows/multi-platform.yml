name: Build Geode Mod
on: [workflow_dispatch, push]

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Este paso instala el SDK necesario para encontrar GeodeConfig.cmake
      - name: Setup Geode SDK
        uses: geode-sdk/setup-geode-sdk@main
        with:
          sdk: nightly

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android32
          sdk: nightly
          combine: false
          
