name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
      
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android 32
            os: ubuntu-latest
            target: android32

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@v3
        with:
          target: ${{ matrix.config.target }}
          sdk: v5.5.0
          combine: true
          
