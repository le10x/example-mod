name: Build Geode Mod
on: [push, workflow_dispatch]

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Este paso instala el SDK y configura las rutas para CMake
      - name: Setup Geode
        uses: geode-sdk/setup-geode@main
        with:
          sdk: v5.5.0

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: android32
          combine: true
          
