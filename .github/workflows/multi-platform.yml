name: Build Geode Mod
on: [push, workflow_dispatch]

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android32
          sdk: v5.5.0
          combine: true
        env:
          # Esto le dice a CMake exactamente dónde buscar el SDK
          GEODE_SDK: /home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/geode-sdk
          
